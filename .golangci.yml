version: "2"

run:
  tests: false
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*net.Conn).Close
      - (*github.com/redis/go-redis/v9.Client).Close

issues:
  exclude-dirs:
    - storetest
